name: Build & Test

on:
  push:
    branches: [main, dev]
  pull_request:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
    - uses: actions/checkout@v3
    
    - name: Set up Go
      uses: actions/setup-go@v4
      with:
        go-version: 1.21
    
    - name: Build orchestrator
      run: cd orchestrator && go build -o ../bin/orchestrator . || true
    
    - name: Build agent
      run: cd agent && go build -o ../bin/agent . || true
